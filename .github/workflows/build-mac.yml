name: Build SENNET macOS

on:
  push:
    branches: [main, master]
    paths:
      - 'sennetv1mac/**'
      - '.github/workflows/build-mac.yml'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number'
        required: false
        default: '4.2.1'
      architectures:
        description: 'Architectures to build (space-separated: arm64 x64)'
        required: false
        default: 'arm64 x64'

jobs:
  # ============================================================
  # Build Apple Silicon (M1/M2/M3/M4/M5)
  # ============================================================
  build-arm64:
    name: Build macOS ARM64 (Apple Silicon)
    runs-on: macos-latest
    # macos-latest hiện là ARM64 (M-series)
    # Nếu cần Intel, dùng macos-13

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set version
        run: |
          VERSION="${{ inputs.version || '4.2.1' }}"
          echo "APP_VERSION=${VERSION}" >> $GITHUB_ENV
          echo "Building SENNET v${VERSION} for macOS ARM64"

      - name: Install ASAR tool
        run: npm install -g @electron/asar

      - name: Install npm dependencies (CẦN cho app hoạt động)
        run: |
          cd sennetv1mac/extracted/app_source
          npm install --production 2>&1 || true
          echo "node_modules size: $(du -sh node_modules | cut -f1)"

      - name: Create .app bundle structure
        run: |
          cd sennetv1mac
          APP_BUNDLE="output/SENNET.app"
          mkdir -p "${APP_BUNDLE}/Contents/MacOS"
          mkdir -p "${APP_BUNDLE}/Contents/Resources/extra/static/icons"
          mkdir -p "${APP_BUNDLE}/Contents/Frameworks"

          # Pack app.asar từ source code (bao gồm node_modules vừa cài)
          cd extracted/app_source
          npx asar pack . "../../${APP_BUNDLE}/Contents/Resources/app.asar"
          cd ../..

          echo "app.asar size: $(wc -c < "${APP_BUNDLE}/Contents/Resources/app.asar") bytes"

      - name: Copy packaging files
        run: |
          cd sennetv1mac
          APP_BUNDLE="output/SENNET.app"

          # Copy Info.plist
          cp packaging/Info.plist "${APP_BUNDLE}/Contents/"

          # Copy tray icons (macOS menu bar — dùng icon template từ packaging)
          if [ -f packaging/iconTemplate.png ]; then
            cp packaging/iconTemplate.png "${APP_BUNDLE}/Contents/Resources/extra/static/icons/enabledTemplate.png"
          fi
          if [ -f packaging/iconTemplate@2x.png ]; then
            cp packaging/iconTemplate@2x.png "${APP_BUNDLE}/Contents/Resources/extra/static/icons/enabledTemplate@2x.png"
          fi

          # Copy App icon (.icns) từ docs/logo/ — đây là logo chính thức giống Windows
          # icon.icns đã được chuẩn bị sẵn với đầy đủ kích thước (16-512px)
          if [ -f "../docs/logo/icon.icns" ]; then
            cp "../docs/logo/icon.icns" "${APP_BUNDLE}/Contents/Resources/electron.icns"
            echo "App icon copied from docs/logo/icon.icns"
          elif [ -f "../docs/logo/icon.png" ]; then
            # Fallback: tạo icns từ PNG (nếu chưa có icon.icns)
            mkdir -p /tmp/icon.iconset
            sips -z 16 16 ../docs/logo/icon.png --out /tmp/icon.iconset/icon_16x16.png 2>/dev/null || true
            sips -z 32 32 ../docs/logo/icon.png --out /tmp/icon.iconset/icon_32x32.png 2>/dev/null || true
            sips -z 128 128 ../docs/logo/icon.png --out /tmp/icon.iconset/icon_128x128.png 2>/dev/null || true
            sips -z 256 256 ../docs/logo/icon.png --out /tmp/icon.iconset/icon_256x256.png 2>/dev/null || true
            sips -z 512 512 ../docs/logo/icon.png --out /tmp/icon.iconset/icon_512x512.png 2>/dev/null || true
            iconutil -c icns /tmp/icon.iconset -o "${APP_BUNDLE}/Contents/Resources/electron.icns" 2>/dev/null || true
            echo "App icon generated from docs/logo/icon.png (fallback)"
          else
            echo "WARNING: No app icon found in docs/logo/"
          fi

      - name: Download Electron for macOS ARM64
        run: |
          cd sennetv1mac
          APP_BUNDLE="output/SENNET.app"

          # Tải Electron cho macOS ARM64
          ELECTRON_VERSION="28.2.0"
          ELECTRON_URL="https://github.com/electron/electron/releases/download/v${ELECTRON_VERSION}/electron-v${ELECTRON_VERSION}-darwin-arm64.zip"

          echo "Downloading Electron ${ELECTRON_VERSION} for darwin-arm64..."
          curl -L -o /tmp/electron-arm64.zip "${ELECTRON_URL}"

          unzip -q /tmp/electron-arm64.zip -d /tmp/electron-arm64

          # Copy Electron binary
          cp /tmp/electron-arm64/Electron.app/Contents/MacOS/Electron "${APP_BUNDLE}/Contents/MacOS/SENNET"
          chmod +x "${APP_BUNDLE}/Contents/MacOS/SENNET"

          # Copy Frameworks
          cp -r /tmp/electron-arm64/Electron.app/Contents/Frameworks/* "${APP_BUNDLE}/Contents/Frameworks/" 2>/dev/null || true

      - name: Build sing-box for macOS ARM64
        run: |
          cd sennetv1mac
          APP_BUNDLE="output/SENNET.app"

          # Build sing-box từ source (nếu có)
          if [ -d "../sing-box" ]; then
            echo "Building sing-box from source..."
            cd ../sing-box
            CGO_ENABLED=1 GOOS=darwin GOARCH=arm64 go build -o ../sennetv1mac/bin/libcore-darwin-arm64 ./cmd/sing-box
            cd ../sennetv1mac
          fi

          # Copy native binary nếu có
          if [ -f "bin/libcore-darwin-arm64" ]; then
            cp bin/libcore-darwin-arm64 "${APP_BUNDLE}/Contents/Resources/extra/libcore"
            cp bin/libcore-darwin-arm64 "${APP_BUNDLE}/Contents/Resources/extra/libcore_backup"
            chmod +x "${APP_BUNDLE}/Contents/Resources/extra/libcore"
            echo "libcore copied for ARM64"
          else
            echo "WARNING: libcore-darwin-arm64 not found — VPN core will not work"
            echo "Place sing-box binary at sennetv1mac/bin/libcore-darwin-arm64"
          fi

      - name: Strip Electron — AN TOÀN, không phá hủy app bundle
        run: |
          cd sennetv1mac
          APP_BUNDLE="output/SENNET.app"
          FW="${APP_BUNDLE}/Contents/Frameworks"

          S0=$(du -sk "${APP_BUNDLE}" | cut -f1)
          echo ">>> START: $((S0/1024))MB"

          # 1. SwiftShader — software GPU renderer (Apple Silicon có GPU hardware)
          find "${FW}" \( -name "SwiftShader" -type d -o -name "*swiftshader*" -o -name "libvk_swiftshader*" \) -exec rm -rf {} + 2>/dev/null || true
          rm -f "${APP_BUNDLE}/Contents/Resources/vk_swiftshader"* 2>/dev/null || true
          S1=$(du -sk "${APP_BUNDLE}" | cut -f1); echo ">>> -SwiftShader: $(((S0-S1)/1024))MB saved"

          # 2. Locales — chỉ giữ English
          find "${APP_BUNDLE}/Contents" -name "*.lproj" -type d | while read lproj; do
            lang=$(basename "$lproj" .lproj)
            case "$lang" in en|English) ;; *) rm -rf "$lproj" 2>/dev/null ;; esac
          done
          S2=$(du -sk "${APP_BUNDLE}" | cut -f1); echo ">>> -Locales: $(((S1-S2)/1024))MB saved"

          # 3. Debug symbols, dSYM, LICENSES, version files
          find "${FW}" \( -name "*.dSYM" -o -name "Debug" -type d -o -name "LICENSE*" -o -name "*.version" \) -exec rm -rf {} + 2>/dev/null || true
          # Xóa Info.plist ngoài .framework bundles
          find "${FW}" -name "Info.plist" -not -path "*\.framework/*" -delete 2>/dev/null || true
          S3=$(du -sk "${APP_BUNDLE}" | cut -f1); echo ">>> -Debug/Licenses: $(((S2-S3)/1024))MB saved"

          # 4. Dọn thư mục trống
          find "${APP_BUNDLE}/Contents" -type d -empty -delete 2>/dev/null || true

          echo ">>> FINAL: $((S3/1024))MB (total saved: $(((S0-S3)/1024))MB)"

      - name: Package DMG (có /Applications symlink)
        run: |
          cd sennetv1mac
          APP_BUNDLE="output/SENNET.app"
          V="${APP_VERSION}"
          codesign --force --deep --sign - "${APP_BUNDLE}" 2>/dev/null || true

          # Tạo thư mục tạm với .app + /Applications symlink
          TMPDIR="/tmp/sennet_dmg_$$"
          rm -rf "${TMPDIR}"
          mkdir -p "${TMPDIR}"
          cp -R "${APP_BUNDLE}" "${TMPDIR}/"
          ln -s /Applications "${TMPDIR}/Applications"

          # Tạo DMG nhanh với UDZO (zlib)
          hdiutil create -volname "SENNET" \
            -srcfolder "${TMPDIR}" \
            -ov -format UDZO \
            "output/SENNET_v${V}_mac_arm64.dmg"
          rm -rf "${TMPDIR}"
          ls -la "output/SENNET_v${V}_mac_arm64.dmg"

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: SENNET_macOS_ARM64
          path: sennetv1mac/output/SENNET_v*_mac_arm64.dmg
          retention-days: 30

  # ============================================================
  # Build Intel Mac
  # ============================================================
  build-x64:
    name: Build macOS x64 (Intel)
    runs-on: macos-13  # Intel Mac runner
    # GH Actions macos-13 là Intel, macos-latest là ARM64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set version
        run: |
          VERSION="${{ inputs.version || '4.2.1' }}"
          echo "APP_VERSION=${VERSION}" >> $GITHUB_ENV
          echo "Building SENNET v${VERSION} for macOS Intel"

      - name: Install ASAR tool
        run: npm install -g @electron/asar

      - name: Create .app bundle structure
        run: |
          cd sennetv1mac
          APP_BUNDLE="output/SENNET_x64.app"
          mkdir -p "${APP_BUNDLE}/Contents/MacOS"
          mkdir -p "${APP_BUNDLE}/Contents/Resources/extra/static/icons"
          mkdir -p "${APP_BUNDLE}/Contents/Frameworks"

          cd extracted/app_source
          npx asar pack . "../../${APP_BUNDLE}/Contents/Resources/app.asar"
          cd ../..

      - name: Copy packaging files
        run: |
          cd sennetv1mac
          APP_BUNDLE="output/SENNET_x64.app"

          # Copy Info.plist
          cp packaging/Info.plist "${APP_BUNDLE}/Contents/"

          # Copy tray icons (macOS menu bar — dùng icon template từ packaging)
          if [ -f packaging/iconTemplate.png ]; then
            cp packaging/iconTemplate.png "${APP_BUNDLE}/Contents/Resources/extra/static/icons/enabledTemplate.png"
          fi
          if [ -f packaging/iconTemplate@2x.png ]; then
            cp packaging/iconTemplate@2x.png "${APP_BUNDLE}/Contents/Resources/extra/static/icons/enabledTemplate@2x.png"
          fi

          # Copy App icon (.icns) từ docs/logo/ — logo chính thức giống Windows
          if [ -f "../docs/logo/icon.icns" ]; then
            cp "../docs/logo/icon.icns" "${APP_BUNDLE}/Contents/Resources/electron.icns"
            echo "App icon copied from docs/logo/icon.icns"
          elif [ -f "../docs/logo/icon.png" ]; then
            # Fallback: tạo icns từ PNG
            mkdir -p /tmp/icon.iconset
            sips -z 16 16 ../docs/logo/icon.png --out /tmp/icon.iconset/icon_16x16.png 2>/dev/null || true
            sips -z 32 32 ../docs/logo/icon.png --out /tmp/icon.iconset/icon_32x32.png 2>/dev/null || true
            sips -z 128 128 ../docs/logo/icon.png --out /tmp/icon.iconset/icon_128x128.png 2>/dev/null || true
            sips -z 256 256 ../docs/logo/icon.png --out /tmp/icon.iconset/icon_256x256.png 2>/dev/null || true
            sips -z 512 512 ../docs/logo/icon.png --out /tmp/icon.iconset/icon_512x512.png 2>/dev/null || true
            iconutil -c icns /tmp/icon.iconset -o "${APP_BUNDLE}/Contents/Resources/electron.icns" 2>/dev/null || true
            echo "App icon generated from docs/logo/icon.png (fallback)"
          else
            echo "WARNING: No app icon found in docs/logo/"
          fi

      - name: Download Electron for macOS x64
        run: |
          cd sennetv1mac
          APP_BUNDLE="output/SENNET_x64.app"
          ELECTRON_VERSION="28.2.0"
          ELECTRON_URL="https://github.com/electron/electron/releases/download/v${ELECTRON_VERSION}/electron-v${ELECTRON_VERSION}-darwin-x64.zip"

          curl -L -o /tmp/electron-x64.zip "${ELECTRON_URL}"
          unzip -q /tmp/electron-x64.zip -d /tmp/electron-x64

          cp /tmp/electron-x64/Electron.app/Contents/MacOS/Electron "${APP_BUNDLE}/Contents/MacOS/SENNET"
          chmod +x "${APP_BUNDLE}/Contents/MacOS/SENNET"
          cp -r /tmp/electron-x64/Electron.app/Contents/Frameworks/* "${APP_BUNDLE}/Contents/Frameworks/" 2>/dev/null || true

      - name: Build sing-box for macOS x64
        run: |
          cd sennetv1mac
          APP_BUNDLE="output/SENNET_x64.app"
          if [ -d "../sing-box" ]; then
            cd ../sing-box
            CGO_ENABLED=1 GOOS=darwin GOARCH=amd64 go build -o ../sennetv1mac/bin/libcore-darwin-amd64 ./cmd/sing-box
            cd ../sennetv1mac
          fi
          if [ -f "bin/libcore-darwin-amd64" ]; then
            cp bin/libcore-darwin-amd64 "${APP_BUNDLE}/Contents/Resources/extra/libcore"
            chmod +x "${APP_BUNDLE}/Contents/Resources/extra/libcore"
          fi

      - name: Strip unnecessary Electron files (giảm dung lượng, AN TOÀN)
        run: |
          cd sennetv1mac
          APP_BUNDLE="output/SENNET_x64.app"
          echo "Before strip: $(du -sh "${APP_BUNDLE}" | cut -f1)"

          # Xóa SwiftShader — software GPU render, tiết kiệm ~30MB
          rm -rf "${APP_BUNDLE}/Contents/Frameworks/"*SwiftShader* 2>/dev/null || true

          # Xóa Vulkan ICD config (không cần)
          rm -f "${APP_BUNDLE}/Contents/Resources/"vk_swiftshader* 2>/dev/null || true

          # XÓA CÓ CHỌN LỌC: chỉ xóa locale .lproj không cần thiết
          # Giữ lại en, zh_CN, zh_TW — KHÔNG xóa các file resource khác
          EF="${APP_BUNDLE}/Contents/Frameworks/Electron Framework.framework"
          if [ -d "$EF/Resources" ]; then
            for lproj in "$EF/Resources/"*.lproj; do
              if [ -d "$lproj" ]; then
                lang=$(basename "$lproj" .lproj)
                case "$lang" in
                  en|zh_CN|zh_TW) ;; # Giữ lại
                  *)
                    rm -rf "$lproj" 2>/dev/null || true
                    echo "  Removed locale: $lang"
                    ;;
                esac
              fi
            done
          fi

          # Xóa Debug symbols, dSYM, LICENSES
          find "${APP_BUNDLE}/Contents/Frameworks" -name "*.dSYM" -exec rm -rf {} + 2>/dev/null || true
          find "${APP_BUNDLE}/Contents/Frameworks" -name "Debug" -type d -exec rm -rf {} + 2>/dev/null || true
          find "${APP_BUNDLE}/Contents/Frameworks" -name "LICENSE*" -delete 2>/dev/null || true
          find "${APP_BUNDLE}/Contents/Frameworks" -name "*.version" -delete 2>/dev/null || true
          find "${APP_BUNDLE}/Contents/Frameworks" -name "Info.plist" -delete 2>/dev/null || true
          find "${APP_BUNDLE}/Contents/Frameworks" -type d -empty -delete 2>/dev/null || true

          echo "After strip: $(du -sh "${APP_BUNDLE}" | cut -f1)"

      - name: Create DMG
        run: |
          cd sennetv1mac
          APP_BUNDLE="output/SENNET_x64.app"
          DMG_NAME="SENNET_v${APP_VERSION}_mac_x64"

          codesign --force --deep --sign - "${APP_BUNDLE}" 2>/dev/null || true

          # Dùng ULFO (lzfse) compression — nén tốt hơn UDZO
          hdiutil create -volname "SENNET" \
            -srcfolder "${APP_BUNDLE}" \
            -ov -format ULFO \
            "output/${DMG_NAME}.dmg"

          ls -la "output/${DMG_NAME}.dmg"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: SENNET_macOS_x64
          path: sennetv1mac/output/SENNET_v*_mac_x64.dmg
          retention-days: 30

  # ============================================================
  # Build Universal Binary (kết hợp ARM64 + x64)
  # ============================================================
  build-universal:
    name: Build macOS Universal (ARM64 + x64)
    runs-on: macos-latest
    needs: [build-arm64, build-x64]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set version
        run: |
          VERSION="${{ inputs.version || '4.2.1' }}"
          echo "APP_VERSION=${VERSION}" >> $GITHUB_ENV

      - name: Download ARM64 artifact
        uses: actions/download-artifact@v4
        with:
          name: SENNET_macOS_ARM64
          path: /tmp/arm64_artifact

      - name: Download x64 artifact
        uses: actions/download-artifact@v4
        with:
          name: SENNET_macOS_x64
          path: /tmp/x64_artifact

      - name: Extract and combine
        run: |
          cd /tmp

          # Mount ARM64 DMG
          echo "Mounting ARM64 DMG..."
          hdiutil attach /tmp/arm64_artifact/*.dmg -mountpoint /tmp/arm64_mnt
          cp -r /tmp/arm64_mnt/SENNET.app /tmp/SENNET_universal.app
          echo "ARM64 app copied to /tmp/SENNET_universal.app"
          hdiutil detach /tmp/arm64_mnt

          # Mount x64 DMG
          echo "Mounting x64 DMG..."
          hdiutil attach /tmp/x64_artifact/*.dmg -mountpoint /tmp/x64_mnt

          # Tạo universal binary với lipo (dùng bản copy arm64 từ /tmp/SENNET_universal.app,
          # không dùng mount point đã detached)
          echo "Creating universal binary..."
          lipo -create \
            /tmp/SENNET_universal.app/Contents/MacOS/SENNET \
            /tmp/x64_mnt/SENNET.app/Contents/MacOS/SENNET \
            -output /tmp/SENNET_universal.app/Contents/MacOS/SENNET

          # Tạo universal libcore nếu có
          if [ -f /tmp/SENNET_universal.app/Contents/Resources/extra/libcore ] && \
             [ -f /tmp/x64_mnt/SENNET.app/Contents/Resources/extra/libcore ]; then
            echo "Creating universal libcore..."
            lipo -create \
              /tmp/SENNET_universal.app/Contents/Resources/extra/libcore \
              /tmp/x64_mnt/SENNET.app/Contents/Resources/extra/libcore \
              -output /tmp/SENNET_universal.app/Contents/Resources/extra/libcore
          fi

          hdiutil detach /tmp/x64_mnt

          echo "Universal binary arch:"
          lipo -info /tmp/SENNET_universal.app/Contents/MacOS/SENNET

          # Tạo DMG universal dùng ULFO compression
          DMG_NAME="SENNET_v${APP_VERSION}_mac_universal"
          echo "Creating universal DMG with ULFO compression..."
          hdiutil create -volname "SENNET" \
            -srcfolder /tmp/SENNET_universal.app \
            -ov -format ULFO \
            "sennetv1mac/output/${DMG_NAME}.dmg"

          ls -la "sennetv1mac/output/${DMG_NAME}.dmg"

      - name: Upload Universal DMG
        uses: actions/upload-artifact@v4
        with:
          name: SENNET_macOS_Universal
          path: sennetv1mac/output/SENNET_v*_mac_universal.dmg
          retention-days: 30
