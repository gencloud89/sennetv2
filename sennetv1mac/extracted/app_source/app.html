<script>
  // === v11-DEBUG v2: VISIBLE on-screen debug overlay ===
  (function() {
    // ---- CREATE VISIBLE DEBUG PANEL ----
    var panel = document.createElement('div');
    panel.id = '__debugPanel';
    panel.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:999999;' +
      'background:#1a1a2e;color:#0f0;font:11px/1.4 monospace;max-height:55vh;overflow-y:auto;' +
      'padding:8px;border-bottom:2px solid #0f0;opacity:0.92;white-space:pre-wrap;word-break:break-all;';
    panel.innerHTML = '<b style="color:#ff0">=== SENNET v11-DEBUG PANEL ===</b>\n';
    document.documentElement.appendChild(panel);

    function panelLog(msg, color) {
      var line = document.createElement('div');
      line.style.cssText = 'color:' + (color || '#0f0') + ';margin:1px 0;';
      line.textContent = new Date().toISOString().substring(11, 23) + ' ' + msg;
      panel.appendChild(line);
      panel.scrollTop = panel.scrollHeight;
      // Also console.log
      console.log('[v11] ' + msg);
    }

    panelLog('Panel initialized', '#ff0');
    panelLog('User-Agent: ' + navigator.userAgent, '#aaa');
    panelLog('Platform: ' + navigator.platform, '#aaa');

    // ---- 1. TEST localStorage ----
    try {
      var testKey = '__v11_test__';
      localStorage.setItem(testKey, '1');
      var testVal = localStorage.getItem(testKey);
      localStorage.removeItem(testKey);
      panelLog('localStorage: ' + (testVal === '1' ? 'OK (writable)' : 'FAIL (readonly?)'), testVal === '1' ? '#0f0' : '#f00');

      var apiUrl = localStorage.getItem('APP_API_URL');
      panelLog('APP_API_URL=' + (apiUrl || '(EMPTY)'), apiUrl ? '#0f0' : '#f00');
      if (!apiUrl || apiUrl.length < 5) {
        localStorage.setItem('APP_API_URL', 'https://kio.senviet.us');
        panelLog('SET APP_API_URL=https://kio.senviet.us', '#ff0');
      }
    } catch(e) {
      panelLog('localStorage ERROR: ' + e.message, '#f00');
    }

    // ---- 2. TEST network connectivity ----
    panelLog('Testing network...', '#aaa');
    var testXhr = new XMLHttpRequest();
    testXhr.open('GET', 'https://appsenviet.htb991.space/host.php', true);
    testXhr.timeout = 10000;
    testXhr.onload = function() {
      panelLog('host.php RESPONSE: HTTP ' + testXhr.status + ' body=' + testXhr.responseText.substring(0, 200), testXhr.status === 200 ? '#0f0' : '#f00');
    };
    testXhr.onerror = function() {
      panelLog('host.php NETWORK ERROR — cannot reach internet!', '#f00');
    };
    testXhr.ontimeout = function() {
      panelLog('host.php TIMEOUT — network blocked or DNS fail', '#f00');
    };
    try { testXhr.send(); } catch(e) {
      panelLog('host.php SEND ERROR: ' + e.message, '#f00');
    }

    // ---- 3. Pass-through fetch with logging ----
    var _orig = window.fetch;
    var _fetchCount = 0;
    window.fetch = function(input, init) {
      _fetchCount++;
      var id = _fetchCount;
      var url = '';
      try { url = typeof input === 'string' ? input : (input && input.url ? input.url : ''); } catch(e) {}
      var shortUrl = url.length > 120 ? url.substring(0, 120) + '...' : url;

      panelLog('FETCH#' + id + ' >> ' + (shortUrl || '(empty url)'), '#88f');

      var startTime = Date.now();
      return _orig.call(this, input, init).then(function(resp) {
        var ms = Date.now() - startTime;
        var color = resp.ok ? '#0f0' : '#f80';
        panelLog('FETCH#' + id + ' << ' + resp.status + ' ' + ms + 'ms ' + shortUrl, color);
        return resp;
      }, function(err) {
        var ms = Date.now() - startTime;
        panelLog('FETCH#' + id + ' !!ERR ' + ms + 'ms: ' + (err.message || err), '#f00');
        return Promise.reject(err);
      });
    };

    // ---- 4. Catch all errors ----
    window.addEventListener('unhandledrejection', function(e) {
      panelLog('UNHANDLED REJECTION: ' + (e.reason ? (e.reason.message || e.reason) : 'unknown'), '#f00');
    });
    window.addEventListener('error', function(e) {
      panelLog('GLOBAL ERROR: ' + e.message + ' @ ' + (e.filename || '?') + ':' + e.lineno, '#f00');
    });

    panelLog('Bootstrap DONE — waiting for app.js...', '#ff0');
  })();
</script>
